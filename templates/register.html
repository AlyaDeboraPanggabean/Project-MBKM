<!DOCTYPE html>
<html>
<head>
    <title>Register - Secure PDF System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #005baa, #ffffff);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-custom {
            background-color: #005baa;
        }

        .btn-primary {
            background-color: #005baa;
            border: none;
        }

        .btn-primary:hover {
            background-color: #003f7f;
        }

        .btn-accent {
            background-color: #f37021;
            border: none;
            color: white;
        }

        .btn-accent:hover {
            background-color: #d95f10;
        }

        .card {
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: none;
        }

        .brand-title {
            font-weight: 700;
            color: #005baa;
        }

        .logo-circle {
            width: 60px;
            height: 60px;
            background-color: #005baa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin: 0 auto 10px;
            font-size: 20px;
        }

        .footer-text {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-custom navbar-dark px-4">
    <span class="navbar-brand fw-bold">Secure PDF System</span>
</nav>

<!-- REGISTER CARD -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card p-4" style="width: 100%; max-width: 420px;">

        <!-- LOGO -->
        <div class="logo-circle">S</div>

        <h4 class="text-center brand-title mb-2">Registrasi Akun</h4>
        <p class="text-center text-muted" style="font-size: 14px;">
            Buat akun untuk mengakses sistem keamanan dokumen
        </p>

        {% if message %}
        <div class="alert alert-{{ status }} text-center">
            {{ message }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-2">
                <label class="form-label">ID Pegawai</label>
                <input type="text" name="employee_id" class="form-control" placeholder="Masukkan ID Pegawai" required>
            </div>

            <div class="mb-2">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Masukkan email" required>
            </div>

            <div class="mb-2">
                <label class="form-label">No HP</label>
                <input type="text" name="phone" class="form-control" placeholder="Masukkan nomor HP" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>
        </form>

        <hr>

        <p class="text-center mb-0" style="font-size: 14px;">
            Sudah punya akun?
            <a href="/login" style="color:#f37021; font-weight: 600;">Login di sini</a>
        </p>

        <div class="footer-text">
            © 2026 Secure Document System
        </div>

    </div>
</div>

</body>
</html>
